server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/biyesheji?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: QazXswEdc!123

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: smtp.qq.com
    port: 587
    username: your-email@qq.com
    password: your-smtp-password
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
    # enabled: false  # 未配置 SMTP 时设为 false 关闭邮件发送

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: biyesheji-jwt-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 604800000  # 7天

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: biyesheji

# 应用配置
app:
  # 文件上传本地存储路径（相对于工作目录，或填绝对路径）
  upload-path: ./uploads
  # 系统名称（用于邮件主题前缀）
  name: 毕业设计管理系统
  # 前端访问地址（用于邮件中的跳转链接）
  frontend-url: http://localhost:5173
  # 通知：邮件开关
  notify:
    email-enabled: false   # 未配置 SMTP 前设为 false
    sse-enabled: true      # 站内实时推送

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn
